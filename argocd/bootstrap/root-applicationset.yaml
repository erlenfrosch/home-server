---
# Reference manifest — the playbook's `argocd` role templates and applies a
# parametrized copy of this from group_vars (argocd_repo_url, argocd_namespace,
# argocd_repo_revision). Edit this file too if you also apply it directly via
# `kubectl apply -f argocd/bootstrap/root-applicationset.yaml`.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: home-server-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/erlenfrosch/home-server.git
        revision: HEAD
        directories:
          - path: "argocd/apps/*"
  template:
    metadata:
      name: "{{.path.basename}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/erlenfrosch/home-server.git
        targetRevision: HEAD
        path: "{{.path.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        # CRD/CR bootstrap (e.g. victoria-metrics-operator installs the
        # VMSingle CRD and a VMSingle resource in one sync) needs the
        # dry-run skip + retry to converge on the first reconciliation.
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 5m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
