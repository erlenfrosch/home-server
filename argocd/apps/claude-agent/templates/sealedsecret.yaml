---
# Seal each value with:
#   echo -n "<plaintext>" \
#     | kubeseal --raw --namespace claude-agent --name claude-agent-secrets \
#         --from-file=/dev/stdin
#
# Or use the kubeseal web UI at https://kubeseal-webgui.homeserver
# and paste the resulting ciphertext into values.yaml under secrets.*
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.secrets.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-agent.labels" . | nindent 4 }}
spec:
  encryptedData:
    {{- if ne .Values.secrets.anthropicApiKey "PLACEHOLDER_SEAL_ME" }}
    ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
    {{- end }}
    {{- if ne .Values.secrets.claudeCodeOauthToken "PLACEHOLDER_SEAL_ME" }}
    CLAUDE_CODE_OAUTH_TOKEN: {{ .Values.secrets.claudeCodeOauthToken | quote }}
    {{- end }}
    {{- if ne .Values.secrets.claudeCredentials "PLACEHOLDER_SEAL_ME" }}
    CLAUDE_CREDENTIALS: {{ .Values.secrets.claudeCredentials | quote }}
    {{- end }}
    {{- if ne .Values.secrets.githubToken "PLACEHOLDER_SEAL_ME" }}
    GITHUB_TOKEN: {{ .Values.secrets.githubToken | quote }}
    {{- end }}
    {{- if ne .Values.gotify.appToken "PLACEHOLDER_SEAL_ME" }}
    GOTIFY_TOKEN: {{ .Values.gotify.appToken | quote }}
    {{- end }}
  template:
    metadata:
      name: {{ .Values.secrets.name }}
      namespace: {{ .Release.Namespace }}
    type: Opaque
