---
# ============================================================
# claude-agent — autonomous GitHub Issue processor
#
# Quick-start checklist:
#   1. Set controller.targetRepo to your GitHub repo (e.g. erlenfrosch/my-project)
#   2. Seal secrets with kubeseal and paste ciphertext into secrets.*
#   3. Optionally adjust ntfy.ingress.host and controller.schedule
# ============================================================

controller:
  # Cron schedule for the issue-controller (default: every 10 minutes)
  schedule: "*/10 * * * *"

  image:
    repository: ghcr.io/erlenfrosch/claude-agent
    pullPolicy: Always
    tag: "latest"

  # GitHub repo the agent will clone and work on — MUST be set
  # Example: "erlenfrosch/my-project"
  targetRepo: "erlenfrosch/fun-nav"

  # Maximum number of concurrently running agent Jobs.
  # "1" = ein Issue nach dem anderen (empfohlen wenn kein labelFilter gesetzt)
  maxPods: "1"

  # GitHub Issue label that marks issues for the agent.
  # Leer = alle offenen Issues werden abgearbeitet (kein Label nötig).
  # Gesetzt = nur Issues mit diesem Label werden verarbeitet.
  labelFilter: ""

  # forgecrate profile + flavors for the agent container
  defaultProfile: "backend"
  defaultFlavors: "github,gitops"

  # Agent container image (the same image is used for the CronJob and the spawned Jobs)
  agentImage: "ghcr.io/erlenfrosch/claude-agent:latest"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ============================================================
# Secrets — seal each value with:
#   echo -n "<plaintext>" \
#     | kubeseal --raw --namespace claude-agent --name claude-agent-secrets \
#         --from-file=/dev/stdin
#
# Or use the kubeseal web UI at https://kubeseal-webgui.homeserver
#
# Authentication: set EITHER anthropicApiKey OR claudeCredentials (not both):
#   anthropicApiKey  → Anthropic pay-per-use API key (sk-ant-...)
#   claudeCredentials → ~/.claude/.credentials.json from a Claude.ai Pro/Max login
#                       (zero API cost, uses subscription quota instead)
# ============================================================
secrets:
  name: claude-agent-secrets
  # Option A: Anthropic API key (pay-per-use, ~$3-10/month for homelab use)
  # Leave as PLACEHOLDER_SEAL_ME if using claudeCodeOauthToken instead.
  anthropicApiKey: "PLACEHOLDER_SEAL_ME"
  # Option B: Long-lived OAuth token (empfohlen, läuft ~1 Jahr, kein Handshake gegen claude.ai)
  # Generieren mit: claude setup-token
  # Versiegeln:
  #   echo -n "<token>" \
  #     | kubeseal --raw --namespace claude-agent --name claude-agent-secrets \
  #         --from-file=/dev/stdin
  claudeCodeOauthToken: ""
  # Option C: OAuth credentials.json (veraltet — schlägt in Clustern fehl, Cloudflare 403)
  # Nur noch als Fallback; bevorzuge claudeCodeOauthToken.
  claudeCredentials: "PLACEHOLDER_SEAL_ME"
  # GITHUB_TOKEN — fine-grained PAT with Issues + Contents + Pull Requests write
  githubToken: ""

# ============================================================
# Gotify — Push-Benachrichtigungen über die bestehende Gotify-Instanz
# Gotify läuft bereits im Cluster (Namespace: gotify).
# ============================================================
gotify:
  # In-Cluster-URL der bestehenden Gotify-Instanz
  url: "http://gotify.gotify.svc.cluster.local"
  # App-Token: In Gotify unter Apps → "claude-agent" → Token kopieren → versiegeln.
  # Versiegeln:
  #   echo -n "<app-token>" \
  #     | kubeseal --raw --namespace claude-agent --name claude-agent-secrets \
  #         --from-file=/dev/stdin
  appToken: ""
