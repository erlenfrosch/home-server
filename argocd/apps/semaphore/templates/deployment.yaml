apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "semaphore.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "semaphore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "semaphore.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "semaphore.selectorLabels" . | nindent 8 }}
    spec:
      # The Semaphore image creates /etc/semaphore as UID 1001. Without
      # fsGroup the persistent volume mounts as root-only and the pod
      # fails to write its BoltDB. Matches the official upstream chart.
      securityContext:
        fsGroup: 1001
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: semaphore
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            # Embedded BoltDB — no external Postgres/MySQL needed for a home setup.
            # For BoltDB, SEMAPHORE_DB_HOST holds the full path to the .boltdb
            # file (the variable is reused — the Semaphore source confirms this).
            - name: SEMAPHORE_DB_DIALECT
              value: "bolt"
            - name: SEMAPHORE_DB_HOST
              value: "/etc/semaphore/database.boltdb"
            - name: SEMAPHORE_TMP_PATH
              value: "/tmp/semaphore"

            # Admin credentials — created on first start, then ignored.
            - name: SEMAPHORE_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecretName }}
                  key: admin_username
            - name: SEMAPHORE_ADMIN_NAME
              value: "Home Server Admin"
            - name: SEMAPHORE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecretName }}
                  key: admin_email
            - name: SEMAPHORE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecretName }}
                  key: admin_password

            # 32-byte base64 key used to encrypt secrets inside Semaphore's DB.
            # CHANGING this after first run will invalidate all stored secrets.
            - name: SEMAPHORE_ACCESS_KEY_ENCRYPTION
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecretName }}
                  key: access_key_encryption

            # Hand ansible-playbook the vault password from the mounted file.
            - name: ANSIBLE_VAULT_PASSWORD_FILE
              value: {{ .Values.vaultPasswordMountPath | quote }}

            - name: SEMAPHORE_LDAP_ACTIVATED
              value: "no"

          volumeMounts:
            - name: data
              mountPath: /etc/semaphore
            - name: tmp
              mountPath: /tmp/semaphore
            - name: vault-password
              mountPath: {{ .Values.vaultPasswordMountPath | quote }}
              subPath: ansible_vault_password
              readOnly: true

          # Use "/" like the official semaphoreui chart — /api/ping is not
          # guaranteed to exist across versions, the web root always returns 200.
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "semaphore.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        - name: vault-password
          secret:
            secretName: {{ .Values.bootstrapSecretName }}
            # 0440 (group read) is required: with fsGroup=1001 the file is
            # owned root:1001, and the pod runs as UID 1001. 0400 would lock
            # the pod out of its own vault password file.
            defaultMode: 0440
            items:
              - key: ansible_vault_password
                path: ansible_vault_password
