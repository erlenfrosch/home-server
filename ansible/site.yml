---
- name: Home Server Setup
  hosts: homeservers
  become: true
  gather_facts: true

  pre_tasks:
    - name: Display server info
      ansible.builtin.debug:
        msg:
          - "Setting up home server: {{ inventory_hostname }}"
          - "IP: {{ ansible_default_ipv4.address }}"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "CPU: {{ ansible_processor_count }} cores"
          - "RAM: {{ ansible_memtotal_mb }} MB"

  roles:
    - role: common
      tags: [common, base]
    - role: dnsmasq
      tags: [dnsmasq, dns]
    - role: tailscale
      tags: [tailscale, vpn]
    - role: k3s
      tags: [k3s, kubernetes]
    - role: argocd
      tags: [argocd, gitops]
    - role: semaphore_secrets
      tags: [semaphore, semaphore-secrets]

  post_tasks:
    - name: Display setup summary
      ansible.builtin.debug:
        msg:
          - "======================================"
          - "Home Server Setup Complete!"
          - "======================================"
          - "ArgoCD UI:    http://{{ ansible_default_ipv4.address }}:30080"
          - "ArgoCD/TS:    http://{{ hostname }}:30080"
          - "Semaphore UI: http://semaphore.homeserver"
          - "kubectl:      kubectl get nodes"
          - "======================================"

# ============================================================
# Distribute the Semaphore SSH key to every managed target so
# Semaphore can SSH in non-interactively. Skipped automatically
# when no target host is defined in the inventory.
# ============================================================
- name: Authorize Semaphore on managed targets
  hosts: semaphore_targets
  become: true
  gather_facts: false
  tags: [semaphore, semaphore-targets]
  roles:
    - role: semaphore_targets

# ============================================================
# After Semaphore is up and reachable, talk to its REST API and
# provision Projects / Keys / Repositories / Inventories /
# Templates so the UI is ready to use with zero manual clicks.
# ============================================================
- name: Bootstrap Semaphore projects via API
  hosts: homeservers
  become: true
  gather_facts: false
  tags: [semaphore, semaphore-bootstrap]
  roles:
    - role: semaphore_bootstrap
