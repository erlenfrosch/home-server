---
# ============================================================
# Inventory
# ============================================================
# `homeservers` runs the full k3s/ArgoCD/Semaphore stack.
# Targets under `semaphore_targets` get the Semaphore SSH public key
# pushed into authorized_keys so the UI can run playbooks against them.
# ============================================================
all:
  children:
    homeservers:
      hosts:
        homeserver:
          # IP or DNS name of your server.
          ansible_host: 192.168.178.127

          # SSH user with passwordless sudo on the target.
          ansible_user: jaydee

          # Path to the private SSH key. Override if you store it elsewhere.
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

          # Force Python 3 — Ubuntu 24.04 ships with Python 3.12.
          ansible_python_interpreter: /usr/bin/python3

    # ------------------------------------------------------------
    # Managed targets — the network gear Semaphore should orchestrate.
    # Add your hosts under the group(s) that fit, then run:
    #   make semaphore-targets
    # to push the Semaphore SSH key into each host's authorized_keys.
    # ------------------------------------------------------------
    semaphore_targets:
      children:
        raspberry_pis:
        ugreen_nas:

    raspberry_pis:
      hosts: {}
      # Example:
      # hosts:
      #   pi-livingroom:
      #     ansible_host: 192.168.178.50
      #     ansible_user: pi
      #     ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    ugreen_nas:
      hosts: {}
      # Example:
      # hosts:
      #   ugreen:
      #     ansible_host: 192.168.178.40
      #     ansible_user: jaydee
      #     ansible_ssh_private_key_file: ~/.ssh/id_ed25519
