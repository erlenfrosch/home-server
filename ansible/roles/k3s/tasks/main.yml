---
# ============================================================
# k3s/tasks/main.yml — k3s Kubernetes installation
# ============================================================

# ---- k3s Configuration Directory ---------------------------
- name: Create /etc/rancher/k3s directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Template k3s server configuration
  ansible.builtin.template:
    src: k3s-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: '0644'

# ---- k3s Installation ---------------------------------------
# Strategy:
#   - If `k3s_version` is set, pin to that exact version.
#   - Otherwise follow `k3s_channel` (e.g. "stable") and let the upstream
#     installer place the latest release in that channel on each run.
# The k3s install script is itself idempotent: if the binary already matches
# the requested version, it skips the download.
- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Get current k3s version (if installed)
  ansible.builtin.command: k3s --version
  register: k3s_current_version
  changed_when: false
  failed_when: false
  when: k3s_binary.stat.exists

- name: Decide whether to (re)run the k3s installer
  ansible.builtin.set_fact:
    k3s_run_installer: >-
      {{
        (not k3s_binary.stat.exists)
        or (k3s_version | length > 0 and k3s_version not in (k3s_current_version.stdout | default('')))
        or (k3s_version | length == 0 and auto_upgrade | bool)
      }}

- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/get-k3s.sh
    mode: '0755'
    force: true
  when: k3s_run_installer

- name: Install or upgrade k3s (pinned version or latest in channel)
  ansible.builtin.command: /tmp/get-k3s.sh server
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_CHANNEL: "{{ k3s_channel | default('stable') }}"
  register: k3s_install
  # The script prints "Skipping binary download" when already current.
  changed_when:
    - k3s_install.rc == 0
    - "'Skipping' not in (k3s_install.stdout | default(''))"
  when: k3s_run_installer

- name: Remove k3s install script
  ansible.builtin.file:
    path: /tmp/get-k3s.sh
    state: absent

# ---- k3s Service Management ---------------------------------
- name: Enable and start k3s service
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for k3s API server to be reachable (port 6443)
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    state: started
    delay: 5
    timeout: 120

- name: Wait for k3s node to be in Ready state
  ansible.builtin.command: kubectl get nodes --no-headers
  register: k3s_nodes_status
  retries: 30
  delay: 10
  until: "'Ready' in k3s_nodes_status.stdout"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Display node status
  ansible.builtin.debug:
    var: k3s_nodes_status.stdout_lines

# ---- kubeconfig Setup for ubuntu user ----------------------
- name: Create .kube directory for ubuntu user
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/.kube
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0700'

- name: Copy k3s kubeconfig to ubuntu user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/{{ ansible_user }}/.kube/config
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'

- name: Set KUBECONFIG in /etc/environment (system-wide)
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: '^KUBECONFIG='
    line: 'KUBECONFIG=/home/{{ ansible_user }}/.kube/config'
    state: present

- name: Set KUBECONFIG in ubuntu user's .bashrc
  ansible.builtin.lineinfile:
    path: /home/{{ ansible_user }}/.bashrc
    regexp: '^export KUBECONFIG='
    line: 'export KUBECONFIG=/home/{{ ansible_user }}/.kube/config'
    state: present
    create: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: Add kubectl completion and `k` alias to ubuntu user's .bashrc
  ansible.builtin.blockinfile:
    path: /home/{{ ansible_user }}/.bashrc
    marker: "# {mark} ANSIBLE MANAGED BLOCK — kubectl"
    block: |
      # kubectl shell completion
      if command -v kubectl &>/dev/null; then
        source <(kubectl completion bash)
        alias k=kubectl
        complete -o default -F __start_kubectl k
      fi
    create: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

# ---- Helm Installation -------------------------------------
# Strategy:
#   - If `helm_version` is set, install that exact version.
#   - Else: install the latest Helm 3 release. With `auto_upgrade: true`
#     the install script re-runs on every play, replacing the binary in
#     place when a newer release exists (no-op otherwise).
- name: Check if Helm is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/helm
  register: k3s_helm_binary

- name: Decide whether to (re)install Helm
  ansible.builtin.set_fact:
    k3s_install_helm: >-
      {{
        (not k3s_helm_binary.stat.exists)
        or (helm_version | length > 0)
        or (auto_upgrade | bool)
      }}

- name: Download Helm install script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get-helm-3.sh
    mode: '0755'
  when: k3s_install_helm

- name: Install (or upgrade) Helm
  ansible.builtin.command: /tmp/get-helm-3.sh
  environment:
    DESIRED_VERSION: "{{ helm_version }}"
    HELM_INSTALL_DIR: /usr/local/bin
  register: k3s_helm_install
  changed_when:
    - k3s_helm_install.rc == 0
    - "'is already' not in (k3s_helm_install.stdout | default(''))"
  when: k3s_install_helm

- name: Remove Helm install script
  ansible.builtin.file:
    path: /tmp/get-helm-3.sh
    state: absent

- name: Verify Helm installation
  ansible.builtin.command: helm version --short
  register: k3s_helm_version
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Display Helm version
  ansible.builtin.debug:
    msg: "Helm installed: {{ k3s_helm_version.stdout }}"

# ---- Verify k3s System Pods --------------------------------
- name: Wait for core system pods to be ready
  ansible.builtin.command: >
    kubectl wait --for=condition=Ready pods
    --all
    -n kube-system
    --timeout=300s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: k3s_core_pods_ready
  changed_when: false
  failed_when: false

- name: Get system pod status
  ansible.builtin.command: kubectl get pods -n kube-system --no-headers
  register: k3s_system_pods
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Show system pod status
  ansible.builtin.debug:
    var: k3s_system_pods.stdout_lines
