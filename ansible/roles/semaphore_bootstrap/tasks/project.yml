---
# ============================================================
# Provision one Semaphore project:
#   1. Project itself
#   2. Default access keys (SSH + None)
#   3. Repository
#   4. Inventories
#   5. Templates
# ============================================================

- name: List existing projects for {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/projects"
    method: GET
    headers:
      Cookie: "{{ semaphore_cookie }}"
    return_content: true
  register: sem_projects_list

- name: Find project id for {{ project_spec.name }}
  ansible.builtin.set_fact:
    project_id: >-
      {{ (sem_projects_list.json
           | selectattr('name', 'equalto', project_spec.name)
           | list | first | default({})).id | default(none) }}

- name: Create project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/projects"
    method: POST
    body_format: json
    body:
      name: "{{ project_spec.name }}"
      alert: false
      max_parallel_tasks: 0
      type: ""
    headers:
      Cookie: "{{ semaphore_cookie }}"
    status_code: [200, 201]
    return_content: true
  register: sem_project_create
  when: project_id in [none, "None", ""]

- name: Capture new project id for {{ project_spec.name }}
  ansible.builtin.set_fact:
    project_id: "{{ sem_project_create.json.id }}"
  when:
    - project_id in [none, "None", ""]
    - sem_project_create is not skipped

- name: Provision default access keys in project {{ project_spec.name }}
  ansible.builtin.include_tasks: key.yml
  loop: "{{ semaphore_default_keys }}"
  loop_control:
    loop_var: key_spec
    label: "{{ key_spec.name }}"

- name: Re-list keys in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/keys"
    method: GET
    headers:
      Cookie: "{{ semaphore_cookie }}"
    return_content: true
  register: sem_keys_list

- name: Build key name→id map for project {{ project_spec.name }}
  ansible.builtin.set_fact:
    project_key_map: >-
      {{ dict(sem_keys_list.json
              | map(attribute='name') | zip(sem_keys_list.json | map(attribute='id'))) }}

- name: Provision repository for project {{ project_spec.name }}
  ansible.builtin.include_tasks: repository.yml

- name: Provision inventories for project {{ project_spec.name }}
  ansible.builtin.include_tasks: inventory.yml
  loop: "{{ project_spec.inventories }}"
  loop_control:
    loop_var: inventory_spec
    label: "{{ inventory_spec.name }}"

- name: Re-list inventories in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/inventory"
    method: GET
    headers:
      Cookie: "{{ semaphore_cookie }}"
    return_content: true
  register: sem_inv_list

- name: Build inventory name→id map for project {{ project_spec.name }}
  ansible.builtin.set_fact:
    project_inventory_map: >-
      {{ dict(sem_inv_list.json
              | map(attribute='name') | zip(sem_inv_list.json | map(attribute='id'))) }}

- name: Provision templates for project {{ project_spec.name }}
  ansible.builtin.include_tasks: template.yml
  loop: "{{ project_spec.templates }}"
  loop_control:
    loop_var: template_spec
    label: "{{ template_spec.name }}"
