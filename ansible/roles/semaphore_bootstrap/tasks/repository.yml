---
# ============================================================
# Provision the project's Git repository entry. Uses the `git-none`
# access key created earlier (public HTTPS clone, no auth).
# ============================================================

- name: List existing repositories in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/repositories"
    method: GET
    headers:
      Cookie: "{{ semaphore_cookie }}"
    return_content: true
  register: sem_repos

- name: Find repository id in project {{ project_spec.name }}
  ansible.builtin.set_fact:
    repository_id: >-
      {{ (sem_repos.json
           | selectattr('name', 'equalto', project_spec.repository.name)
           | list | first | default({})).id | default(none) }}

- name: Create repository in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/repositories"
    method: POST
    body_format: json
    body:
      name: "{{ project_spec.repository.name }}"
      project_id: "{{ project_id | int }}"
      git_url: "{{ project_spec.repository.url }}"
      git_branch: "{{ project_spec.repository.branch | default('main') }}"
      ssh_key_id: "{{ project_key_map['git-none'] | int }}"
    headers:
      Cookie: "{{ semaphore_cookie }}"
    status_code: [200, 201, 204]
    return_content: true
  register: sem_repo_create
  when: repository_id in [none, "None", ""]

- name: Capture new repository id for project {{ project_spec.name }}
  ansible.builtin.set_fact:
    repository_id: "{{ sem_repo_create.json.id }}"
  when:
    - repository_id in [none, "None", ""]
    - sem_repo_create is not skipped
