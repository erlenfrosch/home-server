---
# ============================================================
# semaphore_bootstrap/tasks/main.yml
# Provision Projects / Keys / Repos / Inventories / Templates in
# Semaphore via its REST API. Idempotent: GET list → POST only if a
# resource with that name doesn't exist yet.
# ============================================================

- name: Wait for the semaphore Deployment to roll out
  ansible.builtin.command:
    cmd: kubectl -n {{ semaphore_namespace }} rollout status deploy/semaphore --timeout=300s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Wait for the Semaphore HTTP API to respond
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/ping"
    status_code: 200
    return_content: false
  register: semaphore_ping
  retries: "{{ semaphore_api_ready_retries }}"
  delay: "{{ semaphore_api_ready_delay }}"
  until: semaphore_ping.status == 200

- name: Authenticate against Semaphore
  ansible.builtin.include_tasks: login.yml

- name: Provision each Semaphore project
  ansible.builtin.include_tasks: project.yml
  loop: "{{ semaphore_projects }}"
  loop_control:
    loop_var: project_spec
    label: "{{ project_spec.name }}"

- name: Display Semaphore bootstrap summary
  ansible.builtin.debug:
    msg:
      - "=================================================="
      - "Semaphore projects provisioned"
      - "=================================================="
      - "URL:        {{ semaphore_api_base }}"
      - "Projects:   {{ semaphore_projects | map(attribute='name') | join(', ') }}"
      - "Login:      {{ semaphore_admin_username }} / (see {{ semaphore_admin_password_path }})"
      - "=================================================="
