---
- name: Restart scanbd
  ansible.builtin.systemd:
    name: scanbd
    state: restarted
    daemon_reload: true

- name: Reload udev rules
  ansible.builtin.command:
    cmd: udevadm control --reload-rules
  changed_when: true
  notify: Trigger udev

- name: Trigger udev
  ansible.builtin.command:
    cmd: udevadm trigger
  changed_when: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
