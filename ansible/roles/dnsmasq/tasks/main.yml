---
# ============================================================
# dnsmasq role — wildcard DNS für *.homeserver
# ============================================================
# dnsmasq hört NUR auf der LAN-IP des Servers (nicht 127.0.0.1).
# Der Server selbst nutzt weiterhin systemd-resolved (127.0.0.53).
# LAN-Geräte bekommen die Server-IP per Fritz!Box DHCP als DNS-Server.
# Dadurch gibt es kein Henne-Ei-Problem mit Port 53 und die
# DNS-Auflösung des Servers selbst bleibt während des Ansible-Runs
# unverändert.
# ============================================================

- name: Install dnsmasq
  ansible.builtin.apt:
    name: dnsmasq
    state: "{{ 'latest' if auto_upgrade else 'present' }}"
    update_cache: true

- name: Deploy dnsmasq configuration
  ansible.builtin.template:
    src: dnsmasq.conf.j2
    dest: /etc/dnsmasq.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart dnsmasq

- name: Allow DNS from local subnet (UFW)
  community.general.ufw:
    rule: allow
    port: "53"
    proto: "{{ item }}"
    src: "{{ local_subnet }}"
  loop:
    - tcp
    - udp

- name: Allow DNS from Tailnet (UFW)
  community.general.ufw:
    rule: allow
    port: "53"
    proto: "{{ item }}"
    src: "100.64.0.0/10"
  loop:
    - tcp
    - udp

- name: Enable and start dnsmasq
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: started

- name: Set resolv.conf — dnsmasq primary, Fritz!Box fallback
  ansible.builtin.copy:
    content: |
      nameserver {{ network_static_ip }}
      nameserver {{ network_gateway }}
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: "0644"
